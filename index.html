<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YADMON</title>
  <link rel="stylesheet" href="./css/app.css" />
  <!-- Google Identity Services (token client for Calendar API) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div id="app">
    <!-- Top HUD -->
    <header id="hud">
      <div class="hud-left">
        <span id="logo">YADMON</span>
        <span id="phase-tag">Phase 2</span>
      </div>
      <div class="hud-right">
        <input id="vol" type="range" min="0" max="100" value="50" title="volume" />
        <button id="mute-btn" title="mute">🔊</button>
        <span id="clock" title="America/New_York">--:--</span>
        <span id="status-dot" class="dot" title="status"></span>
        <span id="brain-dot" class="dot" title="companion brain"></span>
        <span id="status-text">booting…</span>
      </div>
    </header>

    <!-- Timeline strip -->
    <section id="timeline-wrap">
      <div id="timeline-head">
        <span id="timeline-title">Today</span>
        <span id="countdown"></span>
      </div>
      <div id="timeline">
        <div id="timeline-track"></div>
        <div id="now-cursor" hidden></div>
      </div>
      <div id="timeline-legend"></div>
    </section>

    <!-- Scene / main area -->
    <main id="scene">
      <div id="signin-panel" class="panel">
        <h1>Good morning.</h1>
        <p id="signin-copy">Sign in with your Google account to wake YADMON.</p>
        <button id="signin-btn" class="btn">Sign in with Google</button>
        <button id="calendar-btn" class="btn" hidden>Connect Google Calendar</button>
        <p id="signin-error" class="error" hidden></p>
      </div>

      <div id="day-panel" class="panel" hidden>
        <div id="speech-bubble" hidden></div>
        <canvas id="room-canvas" width="380" height="220"></canvas>
        <div id="state-banner"><span id="state-mode">—</span><span id="state-reason"></span></div>
        <p id="lineup"></p>
        <ul id="event-list"></ul>
        <div class="row">
          <div>
            <button id="signout-btn" class="btn btn-ghost">Sign out</button>
            <button id="connect-live-btn" class="btn">Connect Google Calendar</button>
          </div>
          <span id="last-poll"></span>
        </div>
      </div>
    </main>

    <!-- Care dock (bottom-right) -->
    <div id="care-dock" hidden>
      <button id="care-undo" title="undo">↶</button>
      <button id="care-btn"><span id="care-icon">💧</span><span id="care-label">water</span></button>
      <div id="care-tally">0</div>
    </div>

    <!-- Modal (confirmations / yes-no / number pad) -->
    <div id="modal" hidden>
      <div class="modal-card">
        <p id="modal-q"></p>
        <div id="modal-chips"></div>
        <div id="modal-pad" hidden>
          <div id="pad-display">0</div>
          <div id="pad-keys"></div>
          <div class="pad-actions">
            <button id="pad-cancel" class="btn btn-ghost">Cancel</button>
            <button id="pad-ok" class="btn">OK</button>
          </div>
        </div>
      </div>
    </div>

    <div id="toasts"></div>

    <footer id="foot">
      <span>read-only calendar · $0 stack · single user</span>
      <button id="key-btn" title="set Gemini key">🔑</button>
      <button id="debug-toggle" title="time machine">⏳</button>
    </footer>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
