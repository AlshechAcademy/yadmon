<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YADMON — Sprite Preview</title>
<style>
  :root{--bg:#0f1420;--panel:#172033;--line:#2c3a58;--ink:#e8f0ff;--dim:#90a0c0;--accent:#7bd88f;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:ui-monospace,Menlo,Consolas,monospace;display:flex;min-height:100vh}
  #stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:20px}
  #room{background:linear-gradient(#1a2740,#0d1526);border:2px solid var(--line);border-radius:12px;image-rendering:pixelated}
  #poseRow{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:520px}
  #panel{width:340px;background:var(--panel);border-left:2px solid var(--line);padding:16px;overflow-y:auto;height:100vh}
  h1{font-size:15px;color:var(--accent);margin:0 0 2px}
  .sub{font-size:11px;color:var(--dim);margin-bottom:12px}
  .trait{margin:10px 0;border-top:1px solid var(--line);padding-top:8px}
  .trait label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
  .trait .val{color:var(--accent)}
  input[type=range]{width:100%}
  .neg{transform:scale(1.1);margin-left:6px}
  button{font-family:inherit;font-size:12px;background:var(--panel);color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:6px 10px;cursor:pointer}
  button.on{background:var(--accent);color:#0b1020;font-weight:700}
  .btnrow{display:flex;gap:6px;margin:10px 0}
  select{font-family:inherit;font-size:12px;background:var(--bg);color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:6px;width:100%}
  .care{color:var(--dim);font-weight:400}
</style>
</head>
<body>
  <div id="stage">
    <canvas id="room" width="420" height="380"></canvas>
    <div id="poseRow"></div>
    <div class="sub">Species base is frozen data. Every slider below is a deterministic overlay — scrub freely, the base never breaks.</div>
  </div>
  <div id="panel">
    <h1>🌱 YADMON Sprite Lab</h1>
    <div class="sub">Species 0 — "Sproutling" · approve me</div>
    <label class="sub">Maturity stage <span id="matVal" class="val">0</span></label>
    <input id="mat" type="range" min="0" max="6" value="0" />
    <div class="btnrow">
      <button id="allMax">All traits → 40</button>
      <button id="reset">Reset</button>
      <button id="faceBtn">Face ◀</button>
    </div>
    <div id="traits"></div>
  </div>

<script type="module">
import { drawCompanion, ANIM } from "./js/sprites.js";

const TRAITS = [
  [1,"Shine","LinkedIn · water"],[2,"Size","WhatsApp · fruit"],[3,"Affection","Mass Email · love"],
  [4,"Explorer","Social · walk"],[5,"Play","Inbounds · toy"],[6,"Clean","Oasis · bath"],
  [7,"Coat","Website · groom"],[8,"Buff","Content · exercise"],[9,"Bling","Automation · treats"],
  [10,"Serenity","Trello · rest"],
];
const state = { anim:"idle", facing:1, maturity:0, traitLevels:{}, neglect:{} };
for(const [i] of TRAITS){ state.traitLevels["t"+i]=0; state.neglect["m"+i]={state:"OK"}; }

// pose buttons
const poseRow=document.getElementById("poseRow");
for(const name of Object.keys(ANIM)){
  const b=document.createElement("button"); b.textContent=name; b.onclick=()=>{state.anim=name; [...poseRow.children].forEach(c=>c.classList.remove("on")); b.classList.add("on");};
  if(name==="idle") b.classList.add("on");
  poseRow.appendChild(b);
}
// trait sliders + neglect toggles
const traitsEl=document.getElementById("traits");
for(const [i,name,care] of TRAITS){
  const wrap=document.createElement("div"); wrap.className="trait";
  wrap.innerHTML=`<label><span>${i}. ${name} <span class="care">${care}</span></span><span><span class="val" id="v${i}">0</span> <input type="checkbox" class="neg" id="n${i}" title="neglect"></span></label><input type="range" id="s${i}" min="0" max="40" value="0">`;
  traitsEl.appendChild(wrap);
  wrap.querySelector("#s"+i).addEventListener("input",e=>{state.traitLevels["t"+i]=+e.target.value; document.getElementById("v"+i).textContent=e.target.value;});
  wrap.querySelector("#n"+i).addEventListener("change",e=>{state.neglect["m"+i]={state:e.target.checked?"NEGLECTED":"OK"};});
}
document.getElementById("mat").addEventListener("input",e=>{state.maturity=+e.target.value; document.getElementById("matVal").textContent=e.target.value;});
document.getElementById("allMax").onclick=()=>{TRAITS.forEach(([i])=>{state.traitLevels["t"+i]=40;document.getElementById("s"+i).value=40;document.getElementById("v"+i).textContent=40;});};
document.getElementById("reset").onclick=()=>{TRAITS.forEach(([i])=>{state.traitLevels["t"+i]=0;state.neglect["m"+i]={state:"OK"};document.getElementById("s"+i).value=0;document.getElementById("v"+i).textContent=0;document.getElementById("n"+i).checked=false;});state.maturity=0;document.getElementById("mat").value=0;document.getElementById("matVal").textContent=0;};
document.getElementById("faceBtn").onclick=(e)=>{state.facing*=-1; e.target.textContent="Face "+(state.facing===1?"◀":"▶");};

const cv=document.getElementById("room"), ctx=cv.getContext("2d");
let wanderX=0;
function loop(t){
  ctx.clearRect(0,0,cv.width,cv.height);
  // floor
  ctx.fillStyle="#0c1220"; ctx.fillRect(0,cv.height-40,cv.width,40);
  let cx=cv.width/2, facing=state.facing;
  if(state.anim==="walk"){ wanderX=(Math.sin(t/2000))*120; cx=cv.width/2+wanderX; facing=Math.cos(t/2000)>0?1:-1; }
  drawCompanion({ctx,cx,cy:cv.height/2+20,px:8,speciesIdx:0,anim:state.anim,tMs:t,traitLevels:state.traitLevels,maturityStage:state.maturity,neglect:state.neglect,facing});
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
